<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OptimizerV5X — Installer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d1117;
--surface:rgba(160,190,220,.06);
--border:rgba(160,200,240,.15);
--accent:#7eb8e8;
--accent2:#a8d4f5;
--silver:#c8daea;
--silver-dim:rgba(200,218,234,.55);
--text:#ddeeff;
--text-dim:rgba(190,215,240,.5);
--glow:rgba(126,184,232,.18)
}
html{scroll-behavior:smooth}
body{
font-family:'DM Mono',monospace;
background:var(--bg);
color:var(--text);
min-height:100vh;
overflow-x:hidden
}
.bg-layer{
position:fixed;inset:0;z-index:0;pointer-events:none;
background:
radial-gradient(ellipse 80% 50% at 20% -10%,rgba(80,140,200,.18)0%,transparent 60%),
radial-gradient(ellipse 60% 40% at 90% 80%,rgba(100,160,220,.13)0%,transparent 55%),
linear-gradient(160deg,#0a0f16 0%,#0d1420 50%,#0b1319 100%)
}
.grid-overlay{
position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.04;
background-image:
linear-gradient(var(--accent)1px,transparent 1px),
linear-gradient(90deg,var(--accent)1px,transparent 1px);
background-size:60px 60px
}
.orb{
position:fixed;border-radius:50%;filter:blur(80px);
pointer-events:none;z-index:0;opacity:0;
animation:orbFloat 12s ease-in-out infinite
}
.orb1{width:420px;height:420px;background:rgba(80,140,210,.15);top:-10%;left:-10%;animation-delay:0s}
.orb2{width:300px;height:300px;background:rgba(100,170,230,.1);bottom:5%;right:-5%;animation-delay:4s}
.orb3{width:200px;height:200px;background:rgba(150,200,240,.09);top:40%;left:60%;animation-delay:7s}
@keyframes orbFloat{
0%{opacity:0;transform:translateY(0)scale(1)}
20%{opacity:1}
50%{transform:translateY(-30px)scale(1.05)}
80%{opacity:1}
100%{opacity:0;transform:translateY(0)scale(1)}
}
.wrapper{
position:relative;z-index:1;
max-width:820px;margin:0 auto;
padding:0 24px 80px
}
header{
padding:64px 0 48px;
display:flex;flex-direction:column;align-items:center;text-align:center;
opacity:0;animation:fadeUp .8s .2s forwards
}
.badge{
display:inline-flex;align-items:center;gap:8px;
padding:6px 14px;border-radius:99px;
border:1px solid var(--border);
background:var(--surface);
font-size:11px;letter-spacing:.12em;text-transform:uppercase;
color:var(--accent2);margin-bottom:28px
}
.badge::before{
content:'';width:6px;height:6px;border-radius:50%;
background:var(--accent);box-shadow:0 0 8px var(--accent);
animation:pulse 2s ease-in-out infinite
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
h1{
font-family:'Syne',sans-serif;
font-size:clamp(2.8rem,6vw,4.4rem);
font-weight:800;
line-height:1.05;
letter-spacing:-.03em;
background:linear-gradient(135deg,#fff 0%,var(--accent2)50%,var(--silver)100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;
margin-bottom:18px
}
.subtitle{
font-size:14px;color:var(--text-dim);
letter-spacing:.04em;max-width:440px;line-height:1.7
}
.install-zone{
margin:44px auto 0;
display:flex;flex-direction:column;align-items:center;gap:14px;
opacity:0;animation:fadeUp .8s .5s forwards
}
.btn-install{
position:relative;
padding:16px 48px;
font-family:'Syne',sans-serif;
font-size:15px;font-weight:700;letter-spacing:.06em;
text-transform:uppercase;
color:#fff;
background:linear-gradient(135deg,#2a6fa8,#4c9fd4,#2a6fa8);
background-size:200% 200%;
border:none;border-radius:12px;
cursor:pointer;
box-shadow:0 0 0 1px rgba(126,184,232,.3),0 8px 32px rgba(60,130,200,.35);
transition:transform .2s,box-shadow .2s;
overflow:hidden
}
.btn-install:hover{transform:translateY(-2px)}
.progress-wrap{width:100%;max-width:480px;margin:28px auto 0;display:none;flex-direction:column;gap:8px}
.progress-wrap.visible{display:flex}
.progress-track{height:3px;background:rgba(126,184,232,.12);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#4c9fd4,#a8d4f5);border-radius:99px}
.progress-label{font-size:11px;color:var(--text-dim);display:flex;justify-content:space-between}
#install-log{max-width:480px;margin:20px auto 0;display:none;flex-direction:column;gap:6px}
#install-log.visible{display:flex}
.log-line{font-size:12px;padding:7px 14px;border-radius:8px;background:rgba(126,184,232,.04);color:var(--text-dim)}
footer{
margin-top:80px;padding-top:28px;
border-top:1px solid var(--border);
text-align:center;
font-size:11px;color:var(--text-dim);letter-spacing:.08em
}
@keyframes fadeUp{
from{opacity:0;transform:translateY(18px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="bg-layer"></div>
<div class="grid-overlay"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="wrapper">

<header>
<div class="badge">v2.4.0 · Optimizer &lt;V5X&gt;</div>
<h1>Instala el<br/>Optimizador</h1>
<p class="subtitle">Una herramienta creada desde cero para mejorar el rendimiento de tu sistema.</p>
</header>

<div class="install-zone">
<button class="btn-install" id="btn-install" onclick="startInstall()">⬇ Instalar ahora</button>

<div class="progress-wrap" id="progress-wrap">
<div class="progress-label">
<span id="progress-step">Iniciando...</span>
<span id="progress-pct">0%</span>
</div>
<div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div id="install-log"></div>
</div>

<footer>
OptimizerV5X © 2026
</footer>

</div>

<script>
const steps=[
{label:'Verificando requisitos del sistema...',pct:10},
{label:'Descargando paquetes...',pct:30},
{label:'Extrayendo archivos...',pct:50},
{label:'Configurando rutas...',pct:65},
{label:'Aplicando optimizaciones...',pct:80},
{label:'Registrando servicios...',pct:92},
{label:'Instalación completada ✓',pct:100}
];

async function startInstall(){
const btn=document.getElementById('btn-install');
const wrap=document.getElementById('progress-wrap');
const fill=document.getElementById('progress-fill');
const pct=document.getElementById('progress-pct');
const step=document.getElementById('progress-step');
const log=document.getElementById('install-log');

btn.textContent='Instalando...';
wrap.classList.add('visible');
log.classList.add('visible');

const a=document.createElement('a');
a.href="https://drive.google.com/uc?export=download&id=1D5TpLy2Lura7FaiC-jyy9Erdh-ILwshw";
a.download="OptimizerV5X.zip";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

for(let i=0;i<steps.length;i++){
let s=steps[i];
step.textContent=s.label;
fill.style.width=s.pct+'%';
pct.textContent=s.pct+'%';

let line=document.createElement('div');
line.className='log-line';
line.textContent=s.label;
log.appendChild(line);

await new Promise(r=>setTimeout(r,700));
}

btn.textContent='Instalado ✓';
}
</script>

</body>
</html>
